<!-- Replace Your Hero Section With This Advanced Premium Hero -->

<section class="relative min-h-screen flex items-center overflow-hidden bg-black text-white">

    <!-- Animated Gradient Background -->

    <!-- Extra Glow Effects -->
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-pink-500/30 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-purple-500/30 rounded-full blur-3xl"></div>

    <!-- Background Fashion Image -->

        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1600"
             class="w-full h-full object-cover">
    </div>

    <!-- Main Content -->
    <div class="relative z-10 max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">

        <!-- Left Content -->
        <div>
            <span class="inline-block px-4 py-2 rounded-full bg-white/10 border border-white/20 text-sm tracking-[4px] uppercase mb-6 backdrop-blur-lg">

            <h1 class="text-6xl md:text-8xl font-black leading-none tracking-tight mb-8">

                <span class="bg-gradient-to-r from-pink-400 via-purple-400 to-yellow-300 text-transparent bg-clip-text">
                    STREET
                </span>
                <br>
                FASHION
            </h1>

            <p class="text-lg text-gray-300 max-w-lg mb-10 leading-relaxed">
                Premium streetwear designed for modern style lovers.
                Bold fashion. Luxury fits. Trendsetting collections crafted for your personality.
            </p>

            <div class="flex flex-wrap gap-5">
                <a href="#new"
                   class="px-8 py-4 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 font-bold hover:scale-105 transition-all shadow-2xl">
                    Shop Now
                </a>

                <a href="#categories"
                   class="px-8 py-4 rounded-full border border-white/30 backdrop-blur-lg hover:bg-white hover:text-black transition-all font-bold">
                    Explore Styles
                </a>
            </div>

            <!-- Stats -->
            <div class="flex gap-10 mt-14">
                <div>
                    <h3 class="text-3xl font-bold">5K+</h3>
                    <p class="text-gray-400 text-sm">Happy Customers</p>
                </div>

                <div>
                    <h3 class="text-3xl font-bold">120+</h3>
                    <p class="text-gray-400 text-sm">Fashion Products</p>
                </div>

                <div>
                    <h3 class="text-3xl font-bold">4.9★</h3>
                    <p class="text-gray-400 text-sm">Customer Rating</p>
                </div>
            </div>
        </div>

        <!-- Right Side Image Cards -->
        <div class="hidden md:grid grid-cols-2 gap-6">

            <div class="space-y-6">

                <div class="rounded-3xl overflow-hidden shadow-2xl h-[300px]">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=800"

                </div>

                <div class="rounded-3xl overflow-hidden shadow-2xl h-[220px]">

                         class="w-full h-full object-cover hover:scale-110 transition duration-700">
                </div>

            </div>

            <div class="space-y-6 pt-12">

                <div class="rounded-3xl overflow-hidden shadow-2xl h-[220px]">
                    <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&q=80&w=800"
                         class="w-full h-full object-cover hover:scale-110 transition duration-700">
                </div>

                <div class="rounded-3xl overflow-hidden shadow-2xl h-[300px]">
                    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&q=80&w=800"
                         class="w-full h-full object-cover hover:scale-110 transition duration-700">
